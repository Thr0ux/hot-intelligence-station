name: Deploy Hot Intelligence Station

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    # 23:10 UTC = 07:10 Asia/Shanghai
    - cron: "10 23 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Update daily data
        if: github.event_name != 'push'
        env:
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: npm run update:daily

      - name: Commit updated data
        if: github.event_name != 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/generated-data.js data/generated-data.backup.js
          if git diff --cached --quiet; then
            echo "No generated data changes to commit."
          else
            git commit -m "Update daily intelligence data"
            git push
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Prepare static site
        run: npm run prepare:site

      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
